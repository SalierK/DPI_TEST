# GoodbyeDPI Linux Configuration File
# This file contains default settings and advanced configuration options

# Basic Settings
# ==============

# Enable auto-detection mode (recommended for most users)
AUTO_MODE=true

# Enable verbose logging
VERBOSE=true

# Run as daemon (background process)
DAEMON=false

# NFQUEUE number to use (0-65535)
QUEUE_NUM=0

# Packet Processing Settings
# =========================

# Fragment HTTP packets (helps bypass some DPI systems)
FRAGMENT_HTTP=false

# Fragment HTTPS packets (helps bypass some DPI systems)
FRAGMENT_HTTPS=false

# Custom TTL value (0 = use system default)
CUSTOM_TTL=0

# Port filtering (0 = process all ports, or specify specific port like 443)
PORT_FILTER=0

# DNS Settings
# ============

# Redirect DNS queries to custom server (leave empty for no redirection)
DNS_REDIRECT=""

# Common DNS servers:
# Google DNS: 8.8.8.8, 8.8.4.4
# Cloudflare DNS: 1.1.1.1, 1.0.0.1
# Quad9 DNS: 9.9.9.9, 149.112.112.112
# Yandex DNS: 77.88.8.8, 77.88.8.1

# Advanced Settings
# =================

# Whitelist file (domains that should always be processed)
WHITELIST_FILE=""

# Blacklist file (domains that should never be processed)
BLACKLIST_FILE=""

# iptables Configuration
# =====================

# Ports to intercept (space-separated list)
INTERCEPT_PORTS="80 443"

# Additional iptables rules (advanced users only)
# Example: "-p udp --dport 53" for DNS interception
EXTRA_IPTABLES_RULES=""

# Service Settings
# ================

# Service restart delay in seconds if it crashes
RESTART_DELAY=5

# Enable service on system boot
ENABLE_ON_BOOT=true

# Optimization Settings
# ====================

# CPU optimization level (1=minimal, 2=balanced, 3=maximum performance)
CPU_OPTIMIZATION=2

# Memory optimization (true/false)
MEMORY_OPTIMIZATION=true

# Network buffer size (8192, 16384, 32768, 65536)
NETWORK_BUFFER_SIZE=16384

# Provider-Specific Presets
# =========================
# Uncomment and modify the section for your ISP

# Generic/Most ISPs
# FRAGMENT_HTTP=true
# FRAGMENT_HTTPS=true
# CUSTOM_TTL=64

# For ISPs with aggressive DPI
# FRAGMENT_HTTP=true
# FRAGMENT_HTTPS=true
# CUSTOM_TTL=64
# DNS_REDIRECT="8.8.8.8"

# For ISPs with DNS blocking only
# DNS_REDIRECT="1.1.1.1"

# For mobile networks
# FRAGMENT_HTTPS=true
# CUSTOM_TTL=64
# PORT_FILTER=443

# Example Configuration Sets
# ==========================

# Minimal impact configuration (lowest resource usage)
# AUTO_MODE=false
# FRAGMENT_HTTPS=true
# PORT_FILTER=443
# VERBOSE=false

# Maximum compatibility configuration (highest success rate)
# AUTO_MODE=true
# FRAGMENT_HTTP=true
# FRAGMENT_HTTPS=true
# CUSTOM_TTL=64
# DNS_REDIRECT="8.8.8.8"

# Stealth configuration (minimal detection)
# FRAGMENT_HTTPS=true
# CUSTOM_TTL=64
# VERBOSE=false